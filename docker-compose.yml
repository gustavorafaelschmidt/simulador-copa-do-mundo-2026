services:
  postgres:
    image: postgres:16-alpine
    container_name: simulador_copa_2026_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simulador_copa_2026
    ports:
      - "5432:5432"
    volumes:
      - simulador_copa_2026_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simulador_copa_2026"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  simulador_copa_2026_postgres_data:
